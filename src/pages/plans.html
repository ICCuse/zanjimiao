<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配置方案 - 台式电脑配置生成助手</title>
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="device-container">
    <!-- iOS状态栏 -->
    <div class="status-bar">
      <div class="time">14:30</div>
      <div class="icons">
        <i class="fas fa-signal"></i>
        <i class="fas fa-wifi"></i>
        <i class="fas fa-battery-three-quarters"></i>
      </div>
    </div>
    
    <!-- 主内容区域 -->
    <div class="app-container">
      <!-- 页面标题 -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin: 10px 0 20px;">
        <h2 style="font-size: 22px;">我的方案</h2>
        <button class="btn btn-small btn-outline">
          <i class="fas fa-filter"></i> 筛选
        </button>
      </div>
      
      <!-- 选项卡 -->
      <div style="display: flex; border-bottom: 1px solid #333; margin-bottom: 20px;">
        <div style="flex: 1; text-align: center; padding: 10px 0; border-bottom: 3px solid var(--primary-color); color: var(--primary-color); font-weight: 600;">
          我创建的
        </div>
        <div style="flex: 1; text-align: center; padding: 10px 0; color: var(--text-gray);">
          收藏的
        </div>
        <div style="flex: 1; text-align: center; padding: 10px 0; color: var(--text-gray);">
          热门方案
        </div>
      </div>
      
      <!-- 方案列表 -->
      <div class="card" style="margin-bottom: 15px;">
        <div style="display: flex; justify-content: space-between;">
          <div style="flex: 1;">
            <h3 style="font-size: 16px; margin-bottom: 6px;">游戏性能主机</h3>
            <p style="font-size: 13px; color: var(--text-gray); margin-bottom: 10px;">
              RTX 4070 + i5-13600KF
            </p>
            <div style="display: flex; gap: 10px; font-size: 12px;">
              <span style="color: var(--text-gray);"><i class="fas fa-calendar" style="margin-right: 4px;"></i> 3天前</span>
              <span style="color: var(--text-gray);"><i class="fas fa-eye" style="margin-right: 4px;"></i> 15次查看</span>
            </div>
          </div>
          <div style="margin-left: 15px; text-align: right;">
            <div style="font-size: 18px; font-weight: 600; color: var(--primary-color); margin-bottom: 6px;">¥8,799</div>
            <button class="btn btn-small btn-outline" style="padding: 6px 12px; margin-top: 5px;">
              <i class="fas fa-eye"></i> 查看
            </button>
          </div>
        </div>
      </div>
      
      <div class="card" style="margin-bottom: 15px;">
        <div style="display: flex; justify-content: space-between;">
          <div style="flex: 1;">
            <h3 style="font-size: 16px; margin-bottom: 6px;">高性能工作站</h3>
            <p style="font-size: 13px; color: var(--text-gray); margin-bottom: 10px;">
              RTX 4090 + Ryzen 9 7950X
            </p>
            <div style="display: flex; gap: 10px; font-size: 12px;">
              <span style="color: var(--text-gray);"><i class="fas fa-calendar" style="margin-right: 4px;"></i> 1周前</span>
              <span style="color: var(--text-gray);"><i class="fas fa-eye" style="margin-right: 4px;"></i> 42次查看</span>
            </div>
          </div>
          <div style="margin-left: 15px; text-align: right;">
            <div style="font-size: 18px; font-weight: 600; color: var(--primary-color); margin-bottom: 6px;">¥24,999</div>
            <button class="btn btn-small btn-outline" style="padding: 6px 12px; margin-top: 5px;">
              <i class="fas fa-eye"></i> 查看
            </button>
          </div>
        </div>
      </div>
      
      <div class="card" style="margin-bottom: 15px;">
        <div style="display: flex; justify-content: space-between;">
          <div style="flex: 1;">
            <h3 style="font-size: 16px; margin-bottom: 6px;">预算游戏电脑</h3>
            <p style="font-size: 13px; color: var(--text-gray); margin-bottom: 10px;">
              RTX 4060 + i5-12400F
            </p>
            <div style="display: flex; gap: 10px; font-size: 12px;">
              <span style="color: var(--text-gray);"><i class="fas fa-calendar" style="margin-right: 4px;"></i> 2周前</span>
              <span style="color: var(--text-gray);"><i class="fas fa-eye" style="margin-right: 4px;"></i> 28次查看</span>
            </div>
          </div>
          <div style="margin-left: 15px; text-align: right;">
            <div style="font-size: 18px; font-weight: 600; color: var(--primary-color); margin-bottom: 6px;">¥5,999</div>
            <button class="btn btn-small btn-outline" style="padding: 6px 12px; margin-top: 5px;">
              <i class="fas fa-eye"></i> 查看
            </button>
          </div>
        </div>
      </div>
      
      <div class="card" style="margin-bottom: 15px;">
        <div style="display: flex; justify-content: space-between;">
          <div style="flex: 1;">
            <h3 style="font-size: 16px; margin-bottom: 6px;">基础办公电脑</h3>
            <p style="font-size: 13px; color: var(--text-gray); margin-bottom: 10px;">
              锐龙5 5600G 集成显卡
            </p>
            <div style="display: flex; gap: 10px; font-size: 12px;">
              <span style="color: var(--text-gray);"><i class="fas fa-calendar" style="margin-right: 4px;"></i> 1个月前</span>
              <span style="color: var(--text-gray);"><i class="fas fa-eye" style="margin-right: 4px;"></i> 17次查看</span>
            </div>
          </div>
          <div style="margin-left: 15px; text-align: right;">
            <div style="font-size: 18px; font-weight: 600; color: var(--primary-color); margin-bottom: 6px;">¥3,499</div>
            <button class="btn btn-small btn-outline" style="padding: 6px 12px; margin-top: 5px;">
              <i class="fas fa-eye"></i> 查看
            </button>
          </div>
        </div>
      </div>
      
      <!-- 浮动按钮 -->
      <button class="btn btn-primary" style="position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; border-radius: 28px; box-shadow: 0 4px 12px rgba(255, 107, 0, 0.4); display: flex; align-items: center; justify-content: center; padding: 0;">
        <i class="fas fa-plus" style="font-size: 20px;"></i>
      </button>
    </div>
    
    <!-- 底部导航栏 -->
    <div class="tab-bar">
      <div class="tab-item">
        <i class="fas fa-home"></i>
        <span>首页</span>
      </div>
      <div class="tab-item">
        <i class="fas fa-laptop"></i>
        <span>配置</span>
      </div>
      <div class="tab-item active">
        <i class="fas fa-list-check"></i>
        <span>方案</span>
      </div>
      <div class="tab-item">
        <i class="fas fa-user"></i>
        <span>我的</span>
      </div>
    </div>
  </div>
</body>
</html>
