<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 台式电脑配置生成助手</title>
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="device-container">
    <!-- iOS状态栏 -->
    <div class="status-bar">
      <div class="time">14:30</div>
      <div class="icons">
        <i class="fas fa-signal"></i>
        <i class="fas fa-wifi"></i>
        <i class="fas fa-battery-three-quarters"></i>
      </div>
    </div>
    
    <!-- 主内容区域 -->
    <div class="app-container">
      <!-- 用户信息卡片 -->
      <div class="card" style="border-radius: 16px; margin-top: 15px; background: linear-gradient(135deg, #333, #1a1a1a); border: none; overflow: hidden; position: relative;">
        <div style="position: absolute; top: -15px; right: -15px; width: 120px; height: 120px; border-radius: 60px; background: radial-gradient(circle, var(--primary-color) 0%, transparent 70%); opacity: 0.3;"></div>
        
        <div style="display: flex; align-items: center; position: relative; z-index: 1;">
          <div style="width: 70px; height: 70px; border-radius: 35px; overflow: hidden; margin-right: 15px; border: 3px solid var(--primary-color);">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde" alt="用户头像" style="width: 100%; height: 100%; object-fit: cover;">
          </div>
          
          <div>
            <h3 style="font-size: 20px; margin-bottom: 5px;">陈小明</h3>
            <p style="color: var(--text-gray); font-size: 14px; margin-bottom: 5px;">组装电脑爱好者</p>
            <div style="display: flex; align-items: center;">
              <i class="fas fa-award" style="color: var(--primary-color); margin-right: 5px;"></i>
              <span style="font-size: 13px;">高级玩家</span>
            </div>
          </div>
        </div>
        
        <div style="display: flex; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px;">
          <div style="flex: 1; text-align: center;">
            <div style="font-size: 20px; font-weight: 600;">12</div>
            <div style="font-size: 13px; color: var(--text-gray);">我的方案</div>
          </div>
          <div style="flex: 1; text-align: center;">
            <div style="font-size: 20px; font-weight: 600;">268</div>
            <div style="font-size: 13px; color: var(--text-gray);">收藏</div>
          </div>
          <div style="flex: 1; text-align: center;">
            <div style="font-size: 20px; font-weight: 600;">1.2k</div>
            <div style="font-size: 13px; color: var(--text-gray);">获赞</div>
          </div>
        </div>
      </div>
      
      <!-- 功能菜单 -->
      <div class="card" style="margin-top: 20px;">
        <div style="margin-bottom: 10px; font-weight: 600; font-size: 16px;">我的服务</div>
        
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center;">
          <div>
            <div style="width: 50px; height: 50px; border-radius: 25px; background-color: rgba(255, 107, 0, 0.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 8px;">
              <i class="fas fa-heart" style="color: var(--primary-color); font-size: 20px;"></i>
            </div>
            <div style="font-size: 13px;">收藏</div>
          </div>
          
          <div>
            <div style="width: 50px; height: 50px; border-radius: 25px; background-color: rgba(255, 107, 0, 0.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 8px;">
              <i class="fas fa-history" style="color: var(--primary-color); font-size: 20px;"></i>
            </div>
            <div style="font-size: 13px;">历史</div>
          </div>
          
          <div>
            <div style="width: 50px; height: 50px; border-radius: 25px; background-color: rgba(255, 107, 0, 0.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 8px;">
              <i class="fas fa-bell" style="color: var(--primary-color); font-size: 20px;"></i>
            </div>
            <div style="font-size: 13px;">通知</div>
          </div>
          
          <div>
            <div style="width: 50px; height: 50px; border-radius: 25px; background-color: rgba(255, 107, 0, 0.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 8px;">
              <i class="fas fa-comment" style="color: var(--primary-color); font-size: 20px;"></i>
            </div>
            <div style="font-size: 13px;">反馈</div>
          </div>
        </div>
      </div>
      
      <!-- 设置菜单 -->
      <div class="card" style="margin-top: 15px;">
        <div style="margin-bottom: 5px; font-weight: 600; font-size: 16px;">设置</div>
        
        <ul style="list-style: none; padding: 0;">
          <li style="padding: 12px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333;">
            <div style="display: flex; align-items: center;">
              <div style="width: 36px; height: 36px; border-radius: 18px; background-color: rgba(255, 107, 0, 0.1); display: flex; align-items: center; justify-content: center; margin-right: 12px;">
                <i class="fas fa-user-shield" style="color: var(--primary-color); font-size: 16px;"></i>
              </div>
              <span>账号与安全</span>
            </div>
            <i class="fas fa-chevron-right" style="color: var(--text-gray); font-size: 14px;"></i>
          </li>
          
          <li style="padding: 12px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333;">
            <div style="display: flex; align-items: center;">
              <div style="width: 36px; height: 36px; border-radius: 18px; background-color: rgba(255, 107, 0, 0.1); display: flex; align-items: center; justify-content: center; margin-right: 12px;">
                <i class="fas fa-moon" style="color: var(--primary-color); font-size: 16px;"></i>
              </div>
              <span>深色模式</span>
            </div>
            <div style="width: 50px; height: 28px; background-color: var(--primary-color); border-radius: 14px; position: relative;">
              <div style="width: 24px; height: 24px; background-color: white; border-radius: 12px; position: absolute; right: 2px; top: 2px;"></div>
            </div>
          </li>
          
          <li style="padding: 12px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333;">
            <div style="display: flex; align-items: center;">
              <div style="width: 36px; height: 36px; border-radius: 18px; background-color: rgba(255, 107, 0, 0.1); display: flex; align-items: center; justify-content: center; margin-right: 12px;">
                <i class="fas fa-bell-slash" style="color: var(--primary-color); font-size: 16px;"></i>
              </div>
              <span>通知设置</span>
            </div>
            <i class="fas fa-chevron-right" style="color: var(--text-gray); font-size: 14px;"></i>
          </li>
          
          <li style="padding: 12px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333;">
            <div style="display: flex; align-items: center;">
              <div style="width: 36px; height: 36px; border-radius: 18px; background-color: rgba(255, 107, 0, 0.1); display: flex; align-items: center; justify-content: center; margin-right: 12px;">
                <i class="fas fa-globe" style="color: var(--primary-color); font-size: 16px;"></i>
              </div>
              <span>语言</span>
            </div>
            <div style="display: flex; align-items: center;">
              <span style="font-size: 14px; color: var(--text-gray); margin-right: 5px;">简体中文</span>
              <i class="fas fa-chevron-right" style="color: var(--text-gray); font-size: 14px;"></i>
            </div>
          </li>
          
          <li style="padding: 12px 0; display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center;">
              <div style="width: 36px; height: 36px; border-radius: 18px; background-color: rgba(255, 107, 0, 0.1); display: flex; align-items: center; justify-content: center; margin-right: 12px;">
                <i class="fas fa-circle-info" style="color: var(--primary-color); font-size: 16px;"></i>
              </div>
              <span>关于我们</span>
            </div>
            <i class="fas fa-chevron-right" style="color: var(--text-gray); font-size: 14px;"></i>
          </li>
        </ul>
      </div>
      
      <!-- 退出登录按钮 -->
      <button class="btn" style="width: 100%; background-color: #333; color: var(--text-gray); margin-top: 20px; margin-bottom: 20px;">
        退出登录
      </button>
    </div>
    
    <!-- 底部导航栏 -->
    <div class="tab-bar">
      <div class="tab-item">
        <i class="fas fa-home"></i>
        <span>首页</span>
      </div>
      <div class="tab-item">
        <i class="fas fa-laptop"></i>
        <span>配置</span>
      </div>
      <div class="tab-item">
        <i class="fas fa-list-check"></i>
        <span>方案</span>
      </div>
      <div class="tab-item active">
        <i class="fas fa-user"></i>
        <span>我的</span>
      </div>
    </div>
  </div>
</body>
</html>
